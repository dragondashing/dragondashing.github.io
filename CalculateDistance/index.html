<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>租房通勤距离计算器</title>
  <style>
    :root {
      --blue-900: #0f3d75;
      --blue-700: #1769c2;
      --blue-600: #2485f0;
      --blue-100: #eaf4ff;
      --blue-050: #f5faff;
      --white: #ffffff;
      --gray-900: #172033;
      --gray-600: #667085;
      --gray-300: #d0d7e2;
      --green: #0a9f66;
      --orange: #f79009;
      --purple: #7a5af8;
      --red: #d92d20;
      --shadow: 0 16px 40px rgba(23, 105, 194, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--gray-900);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background:
        radial-gradient(circle at 16% 8%, rgba(36, 133, 240, 0.14), transparent 28%),
        linear-gradient(135deg, #f8fbff 0%, #eef6ff 100%);
    }

    header {
      padding: 34px 24px 18px;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: var(--blue-900);
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: 0.02em;
    }

    .subtitle {
      max-width: 760px;
      margin: 12px auto 0;
      color: var(--gray-600);
      font-size: 15px;
      line-height: 1.7;
    }

    main {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto 42px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 22px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(36, 133, 240, 0.14);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel {
      padding: 22px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
      color: var(--blue-900);
      font-size: 18px;
      font-weight: 700;
    }

    .badge {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      color: var(--white);
      background: var(--blue-600);
      font-size: 14px;
      font-weight: 700;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      color: var(--gray-900);
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 44px;
      padding: 0 13px;
      color: var(--gray-900);
      background: var(--blue-050);
      border: 1px solid var(--gray-300);
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      transition: border 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    input:focus {
      background: var(--white);
      border-color: var(--blue-600);
      box-shadow: 0 0 0 4px rgba(36, 133, 240, 0.12);
    }

    .hint {
      margin: 8px 0 0;
      color: var(--gray-600);
      font-size: 12px;
      line-height: 1.55;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      height: 44px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.12s ease, opacity 0.16s ease, box-shadow 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      transform: none;
    }

    .primary {
      color: var(--white);
      background: linear-gradient(135deg, var(--blue-700), var(--blue-600));
      box-shadow: 0 12px 24px rgba(36, 133, 240, 0.22);
    }

    .secondary {
      color: var(--blue-700);
      background: var(--blue-100);
    }

    .full {
      grid-column: 1 / -1;
    }

    .divider {
      height: 1px;
      margin: 22px 0;
      background: linear-gradient(90deg, transparent, rgba(36, 133, 240, 0.28), transparent);
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      color: var(--blue-900);
      background: var(--blue-100);
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }

    .status.error {
      color: var(--red);
      background: #fff1f0;
    }

    .status.success {
      color: var(--green);
      background: #ecfdf3;
    }

    #map {
      height: 340px;
      border-bottom: 1px solid rgba(36, 133, 240, 0.14);
      background: linear-gradient(135deg, #d9ecff, #f8fbff);
    }

    .results {
      padding: 20px 22px 24px;
    }

    .result-list {
      display: grid;
      gap: 16px;
    }

    .result-card {
      border: 2px solid rgba(36, 133, 240, 0.16);
      border-radius: 18px;
      background: linear-gradient(180deg, var(--white), var(--blue-050));
      overflow: hidden;
    }

    .result-card.ab {
      border-left: 8px solid var(--blue-600);
    }

    .result-card.ca {
      border-left: 8px solid var(--green);
    }

    .result-card.cb {
      border-left: 8px solid var(--orange);
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      background: rgba(234, 244, 255, 0.78);
      border-bottom: 1px solid rgba(36, 133, 240, 0.12);
    }

    .route-title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--blue-900);
      font-size: 17px;
      font-weight: 800;
    }

    .route-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      height: 30px;
      padding: 0 10px;
      color: var(--white);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .ab .route-chip {
      background: var(--blue-600);
    }

    .ca .route-chip {
      background: var(--green);
    }

    .cb .route-chip {
      background: var(--orange);
    }

    .line-distance {
      min-width: 130px;
      padding: 8px 12px;
      color: var(--blue-900);
      text-align: right;
      background: var(--white);
      border: 1px solid rgba(36, 133, 240, 0.18);
      border-radius: 12px;
      font-weight: 800;
    }

    .line-distance span {
      display: block;
      color: var(--gray-600);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .route-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
    }

    .route-table th,
    .route-table td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #edf2f7;
      font-size: 13px;
      vertical-align: top;
    }

    .route-table th {
      color: var(--blue-900);
      background: #f7fbff;
      font-weight: 800;
    }

    .route-table tr:last-child td {
      border-bottom: 0;
    }

    .mode-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--blue-700);
      background: var(--blue-100);
      font-weight: 800;
    }

    .empty {
      padding: 36px 18px;
      color: var(--gray-600);
      text-align: center;
      background: var(--blue-050);
      border: 1px dashed rgba(36, 133, 240, 0.28);
      border-radius: 16px;
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      .result-head {
        align-items: stretch;
        flex-direction: column;
      }

      .line-distance {
        text-align: left;
      }
    }

    @media (max-width: 680px) {
      .result-card {
        overflow-x: auto;
      }

      .route-table {
        min-width: 620px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>租房通勤距离计算器</h1>
    <p class="subtitle">
      输入你和朋友的两个公司地址 A/B，再输入候选租房地址 C，自动分组展示 C 到 A、C 到 B 的距离与驾车、步行、骑行、公交/地铁通勤时间。
    </p>
  </header>

  <main>
    <section class="card panel">
      <h2 class="section-title"><span class="badge">1</span>地图服务设置</h2>
      <label for="apiKey">高德地图 Web JS API Key</label>
      <input id="apiKey" type="password" autocomplete="off" placeholder="粘贴你的 Key，例如 7fxxxxxxxxxxxxxxxxxxxx" />
      <label for="securityCode">安全密钥 Security JS Code（如已配置必填）</label>
      <input id="securityCode" type="password" autocomplete="off" placeholder="可选，高德控制台安全密钥" />
      <label for="city">城市</label>
      <input id="city" type="text" placeholder="例如：上海、北京、杭州" />
      <p class="hint">地址解析和公交/地铁换乘通常需要城市信息。Key 与安全密钥只保存在当前浏览器本地。</p>
      <div class="btn-row">
        <button class="primary" id="loadMapBtn">加载地图服务</button>
        <button class="secondary" id="clearConfigBtn">清除设置</button>
      </div>

      <div class="divider"></div>

      <h2 class="section-title"><span class="badge">2</span>A/B 公司地址</h2>
      <label for="addrA">地址 A：你的公司</label>
      <input id="addrA" type="text" placeholder="例如：上海市徐汇区漕溪北路..." />
      <label for="addrB">地址 B：朋友公司</label>
      <input id="addrB" type="text" placeholder="例如：上海市浦东新区世纪大道..." />

      <div class="divider"></div>

      <h2 class="section-title"><span class="badge">3</span>候选租房地址 C</h2>
      <label for="addrC">地址 C：候选租房位置</label>
      <input id="addrC" type="text" placeholder="例如：上海市静安区..." />
      <div class="btn-row">
        <button class="primary full" id="calcCBtn">计算 C 到 A/B 通勤</button>
      </div>
      <div class="status" id="status"></div>
    </section>

    <section class="card">
      <div id="map"></div>
      <div class="results">
        <h2 class="section-title"><span class="badge">✓</span>分组结果</h2>
        <div id="emptyState" class="empty">输入地址并点击计算后，这里会按「C 到 A」「C 到 B」分成 2 个独立结果区。</div>
        <div class="result-list" id="resultList" style="display:none;">
          <article class="result-card ca" id="cardCA" style="display:none;">
            <div class="result-head">
              <div class="route-title"><span class="route-chip">C → A</span>候选房源到你的公司</div>
              <div class="line-distance"><span>直线距离</span><strong id="caLine">--</strong></div>
            </div>
            <table class="route-table">
              <thead>
                <tr>
                  <th>交通方式</th>
                  <th>路线距离</th>
                  <th>预计时间</th>
                  <th>说明</th>
                </tr>
              </thead>
              <tbody id="bodyCA"></tbody>
            </table>
          </article>

          <article class="result-card cb" id="cardCB" style="display:none;">
            <div class="result-head">
              <div class="route-title"><span class="route-chip">C → B</span>候选房源到朋友公司</div>
              <div class="line-distance"><span>直线距离</span><strong id="cbLine">--</strong></div>
            </div>
            <table class="route-table">
              <thead>
                <tr>
                  <th>交通方式</th>
                  <th>路线距离</th>
                  <th>预计时间</th>
                  <th>说明</th>
                </tr>
              </thead>
              <tbody id="bodyCB"></tbody>
            </table>
          </article>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "rent_commute_config_v1";
    const state = {
      map: null,
      AMap: null,
      markers: [],
      positions: {
        A: null,
        B: null,
        C: null
      }
    };

    const els = {
      apiKey: document.querySelector("#apiKey"),
      securityCode: document.querySelector("#securityCode"),
      city: document.querySelector("#city"),
      addrA: document.querySelector("#addrA"),
      addrB: document.querySelector("#addrB"),
      addrC: document.querySelector("#addrC"),
      loadMapBtn: document.querySelector("#loadMapBtn"),
      clearConfigBtn: document.querySelector("#clearConfigBtn"),
      calcCBtn: document.querySelector("#calcCBtn"),
      status: document.querySelector("#status"),
      emptyState: document.querySelector("#emptyState"),
      resultList: document.querySelector("#resultList"),
      cardCA: document.querySelector("#cardCA"),
      cardCB: document.querySelector("#cardCB"),
      bodyCA: document.querySelector("#bodyCA"),
      bodyCB: document.querySelector("#bodyCB"),
      caLine: document.querySelector("#caLine"),
      cbLine: document.querySelector("#cbLine")
    };

    init();

    function init() {
      const saved = readConfig();
      els.apiKey.value = saved.apiKey || "";
      els.securityCode.value = saved.securityCode || "";
      els.city.value = saved.city || "";
      setBusy(false);
      bindEvents();
      if (saved.apiKey) {
        loadAMap()
          .catch((error) => showStatus(error.message, "error"))
          .finally(() => setBusy(false));
      }
    }

    function bindEvents() {
      els.loadMapBtn.addEventListener("click", async () => {
        try {
          saveConfig();
          await loadAMap();
        } catch (error) {
          showStatus(error.message, "error");
        } finally {
          setBusy(false);
        }
      });

      els.clearConfigBtn.addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        els.apiKey.value = "";
        els.securityCode.value = "";
        els.city.value = "";
        showStatus("已清除本地保存的 Key、密钥和城市。", "success");
      });

      els.calcCBtn.addEventListener("click", () => runC());
    }

    function readConfig() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveConfig() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        apiKey: els.apiKey.value.trim(),
        securityCode: els.securityCode.value.trim(),
        city: els.city.value.trim()
      }));
    }

    async function loadAMap() {
      const apiKey = els.apiKey.value.trim();
      if (!apiKey) {
        throw new Error("请先填写高德地图 Web JS API Key。");
      }

      setBusy(true, "正在加载地图服务...");
      saveConfig();

      if (window.AMap) {
        state.AMap = window.AMap;
        ensureMap();
        showStatus("地图服务已加载，可以开始计算。", "success");
        return;
      }

      const securityCode = els.securityCode.value.trim();
      if (securityCode) {
        window._AMapSecurityConfig = { securityJsCode: securityCode };
      }

      await new Promise((resolve, reject) => {
        const callbackName = "initAMap_" + Date.now();
        const script = document.createElement("script");
        window[callbackName] = () => {
          delete window[callbackName];
          resolve();
        };
        script.onerror = () => reject(new Error("地图服务加载失败，请检查 Key、网络或安全密钥设置。"));
        script.src = `https://webapi.amap.com/maps?v=2.0&key=${encodeURIComponent(apiKey)}&plugin=AMap.Geocoder,AMap.Driving,AMap.Walking,AMap.Riding,AMap.Transfer,AMap.Scale,AMap.ToolBar&callback=${callbackName}`;
        document.head.appendChild(script);
      });

      state.AMap = window.AMap;
      ensureMap();
      showStatus("地图服务已加载，可以开始计算。", "success");
    }

    function ensureMap() {
      if (state.map || !state.AMap) return;
      state.map = new state.AMap.Map("map", {
        zoom: 11,
        resizeEnable: true,
        viewMode: "2D"
      });
      state.map.addControl(new state.AMap.Scale());
      state.map.addControl(new state.AMap.ToolBar({ position: "RB" }));
    }

    async function runC() {
      try {
        await ensureReady();
        const addrA = els.addrA.value.trim();
        const addrB = els.addrB.value.trim();
        const addrC = els.addrC.value.trim();
        if (!addrA || !addrB || !addrC) throw new Error("请完整填写地址 A、地址 B 和候选租房地址 C。");
        setBusy(true, "正在计算 C 到 A/B 的通勤距离和时间...");

        const missingTasks = [];
        if (!state.positions.A) missingTasks.push(geocode(addrA, "A").then((pos) => state.positions.A = pos));
        if (!state.positions.B) missingTasks.push(geocode(addrB, "B").then((pos) => state.positions.B = pos));
        missingTasks.push(geocode(addrC, "C").then((pos) => state.positions.C = pos));
        await Promise.all(missingTasks);

        const A = state.positions.A.location;
        const B = state.positions.B.location;
        const C = state.positions.C.location;

        els.caLine.textContent = formatDistance(lineDistance(C, A));
        els.cbLine.textContent = formatDistance(lineDistance(C, B));
        addMarkers();

        const [rowsCA, rowsCB] = await Promise.all([
          routeGroup(C, A),
          routeGroup(C, B)
        ]);
        renderGroup("CA", rowsCA);
        renderGroup("CB", rowsCB);
        showStatus("候选地址 C 的通勤对比计算完成，已分为绿色和橙色两个结果区。", "success");
      } catch (error) {
        showStatus(error.message, "error");
      } finally {
        setBusy(false);
      }
    }

    async function ensureReady() {
      if (!window.AMap) {
        await loadAMap();
      }
      ensureMap();
    }

    function geocode(address, label) {
      const AMap = state.AMap;
      const city = els.city.value.trim();
      return new Promise((resolve, reject) => {
        const geocoder = new AMap.Geocoder({
          city: city || "全国",
          extensions: "base"
        });
        geocoder.getLocation(address, (status, result) => {
          if (status === "complete" && result.geocodes && result.geocodes.length) {
            const item = result.geocodes[0];
            resolve({
              label,
              address: item.formattedAddress || address,
              location: item.location
            });
          } else {
            reject(new Error(`地址 ${label} 解析失败：请补充城市、区县或更完整门牌信息。`));
          }
        });
      });
    }

    async function routeGroup(origin, destination) {
      const tasks = [
        routeByDriving(origin, destination),
        routeByWalking(origin, destination),
        routeByRiding(origin, destination),
        routeByTransit(origin, destination)
      ];

      return Promise.all(tasks);
    }

    function routeByDriving(origin, destination) {
      const AMap = state.AMap;
      return new Promise((resolve) => {
        const driving = new AMap.Driving({
          policy: AMap.DrivingPolicy.LEAST_TIME,
          city: els.city.value.trim()
        });
        driving.search(origin, destination, (status, result) => {
          const plan = result && result.routes && result.routes[0];
          resolve(plan ? {
            mode: "驾车",
            distance: plan.distance,
            time: plan.time,
            note: "按高德“速度优先”策略估算，实际时间会受拥堵影响。"
          } : fallbackRow("驾车"));
        });
      });
    }

    function routeByWalking(origin, destination) {
      const AMap = state.AMap;
      return new Promise((resolve) => {
        const walking = new AMap.Walking();
        walking.search(origin, destination, (status, result) => {
          const plan = result && result.routes && result.routes[0];
          resolve(plan ? {
            mode: "步行",
            distance: plan.distance,
            time: plan.time,
            note: "适合短距离参考，长距离可能不返回路线。"
          } : fallbackRow("步行"));
        });
      });
    }

    function routeByRiding(origin, destination) {
      const AMap = state.AMap;
      return new Promise((resolve) => {
        const riding = new AMap.Riding();
        riding.search(origin, destination, (status, result) => {
          const plan = result && result.routes && result.routes[0];
          resolve(plan ? {
            mode: "骑行",
            distance: plan.distance,
            time: plan.time,
            note: "适合估算自行车或电动车路线，实际以道路规则为准。"
          } : fallbackRow("骑行"));
        });
      });
    }

    function routeByTransit(origin, destination) {
      const AMap = state.AMap;
      const city = els.city.value.trim();
      if (!city) {
        return Promise.resolve({
          mode: "公交/地铁",
          distance: null,
          time: null,
          note: "请填写城市后再计算公交/地铁换乘。"
        });
      }

      return new Promise((resolve) => {
        const transfer = new AMap.Transfer({
          city,
          policy: AMap.TransferPolicy.LEAST_TIME
        });
        transfer.search(origin, destination, (status, result) => {
          const plan = result && result.plans && result.plans[0];
          resolve(plan ? {
            mode: "公交/地铁",
            distance: plan.distance || null,
            time: plan.time || null,
            note: plan.segments ? `推荐换乘方案约 ${plan.segments.length} 段。` : "按高德最少时间策略估算。"
          } : fallbackRow("公交/地铁"));
        });
      });
    }

    function fallbackRow(mode) {
      return {
        mode,
        distance: null,
        time: null,
        note: "地图服务未返回该方式结果，可尝试补充城市、区县或更精确地址。"
      };
    }

    function renderGroup(group, rows) {
      const body = els[`body${group}`];
      const card = els[`card${group}`];
      body.innerHTML = "";

      rows.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><span class="mode-tag">${escapeHtml(row.mode)}</span></td>
          <td>${row.distance ? formatDistance(row.distance) : "--"}</td>
          <td>${row.time ? formatTime(row.time) : "--"}</td>
          <td>${escapeHtml(row.note || "")}</td>
        `;
        body.appendChild(tr);
      });

      card.style.display = "block";
      updateResultVisibility();
    }

    function updateResultVisibility() {
      const hasResult = [els.cardCA, els.cardCB].some((card) => card.style.display !== "none");
      els.emptyState.style.display = hasResult ? "none" : "block";
      els.resultList.style.display = hasResult ? "grid" : "none";
    }

    function addMarkers() {
      const AMap = state.AMap;
      if (!state.map) return;
      state.markers.forEach((marker) => marker.setMap(null));
      state.markers = [];

      Object.entries(state.positions).forEach(([label, pos]) => {
        if (!pos) return;
        const marker = new AMap.Marker({
          position: pos.location,
          title: `${label}: ${pos.address}`,
          label: {
            content: label,
            direction: "top"
          }
        });
        marker.setMap(state.map);
        state.markers.push(marker);
      });

      if (state.markers.length) {
        state.map.setFitView(state.markers, false, [70, 70, 70, 70], 14);
      }
    }

    function lineDistance(origin, destination) {
      const toRad = (deg) => deg * Math.PI / 180;
      const lon1 = origin.lng;
      const lat1 = origin.lat;
      const lon2 = destination.lng;
      const lat2 = destination.lat;
      const earth = 6371008.8;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return earth * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(meters) {
      if (!Number.isFinite(Number(meters))) return "--";
      return meters >= 1000
        ? `${(meters / 1000).toFixed(2)} km`
        : `${Math.round(meters)} m`;
    }

    function formatTime(seconds) {
      if (!Number.isFinite(Number(seconds))) return "--";
      const minutes = Math.round(seconds / 60);
      if (minutes < 60) return `${minutes} 分钟`;
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      return rest ? `${hours} 小时 ${rest} 分钟` : `${hours} 小时`;
    }

    function setBusy(isBusy, message) {
      [els.loadMapBtn, els.calcCBtn].forEach((btn) => {
        btn.disabled = isBusy;
      });
      if (message) showStatus(message);
    }

    function showStatus(message, type) {
      els.status.textContent = message;
      els.status.className = `status ${type || ""}`.trim();
      els.status.style.display = "block";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
